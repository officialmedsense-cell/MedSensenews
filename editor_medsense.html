<!DOCTYPE html>
<html lang="en" data-theme="light">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>MedSense Editorial Control | Staff Login</title>
    <link rel="stylesheet" href="styles.css">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css">
    <!-- Quill.js - Professional Editor -->
    <link href="https://cdn.quilljs.com/1.3.6/quill.snow.css" rel="stylesheet">
    <script src="https://cdn.quilljs.com/1.3.6/quill.js"></script>
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link
        href="https://fonts.googleapis.com/css2?family=Outfit:wght@300;400;500;600;700;800&family=Inter:wght@300;400;500;600;700&display=swap"
        rel="stylesheet">
</head>

<body class="cms-body">
    <header class="header" style="justify-content: center;">
        <div class="brand">
            <div class="logo">
                <img src="logo.png" alt="MedSense News" class="logo-icon">
                <span class="logo-text">Editorial Control Center</span>
            </div>
        </div>
    </header>

    <main id="app">
        <!-- Dashboard / Login renders here -->
    </main>

    <footer class="footer" style="padding: 2rem 0; margin-top: 4rem;">
        <div class="container" style="text-align: center;">
            <p style="opacity: 0.7;">&copy; 2026 MedSense News Editorial Unit. Unauthorized access is prohibited.</p>
        </div>
    </footer>

    <!-- Toast Container -->
    <div class="toast-container" id="toastContainer"></div>

    <!-- Scripts -->
    <!-- Supabase SDK -->
    <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>

    <script src="supabase-config.js"></script>
    <script src="data.js"></script>
    <script src="cms.js"></script>
</body>

</html>
